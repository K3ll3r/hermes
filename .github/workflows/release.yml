name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux deps
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Run unit tests
        if: matrix.goos == 'linux'
        run: go test -v -race -count=1 -tags webkit2_41 ./internal/...

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build with Wails
        shell: bash
        run: |
          BUILD_FLAGS="-platform ${{ matrix.goos }}/${{ matrix.goarch }}"
          BUILD_FLAGS="$BUILD_FLAGS -ldflags \"-s -w -X github.com/TsekNet/hermes/cmd.Version=${{ github.ref_name }} -X github.com/TsekNet/hermes/cmd.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)\""
          if [ "${{ matrix.goos }}" = "linux" ]; then
            BUILD_FLAGS="$BUILD_FLAGS -tags webkit2_41"
          fi
          eval wails build -skipbindings $BUILD_FLAGS

      - name: Install WiX (Windows)
        if: matrix.goos == 'windows'
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add -g WixToolset.Util.wixext/6.0.1

      - name: Build MSI (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          export PATH="$PATH:$HOME/.dotnet/tools"
          wix build build/windows/msi/hermes.wxs -arch x64 -ext WixToolset.Util.wixext -d Version="$VERSION" -d StagingDir=build/bin -o dist/hermes.msi

      - name: Package release artifacts
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            cp build/bin/hermes.app/Contents/MacOS/hermes dist/hermes-darwin-${{ matrix.goarch }}
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            :  # hermes.msi already in dist from Build MSI step
          elif [ "${{ matrix.goos }}" = "linux" ]; then
            cp build/bin/hermes dist/hermes
            chmod +x dist/hermes
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish-deb:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: hermes-linux-amd64
          path: dist/

      - name: Build .deb package
        working-directory: dist
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ARCH=amd64
          PKG=hermes_${VERSION}
          mkdir -p "${PKG}/usr/local/bin" "${PKG}/usr/lib/systemd/user"
          cp -f hermes "${PKG}/usr/local/bin/"
          chmod 755 "${PKG}/usr/local/bin/hermes"
          printf '%s\n' '[Unit]' 'Description=Hermes notification service' '' \
            '[Service]' 'ExecStart=/usr/local/bin/hermes serve' 'Restart=on-failure' '' \
            '[Install]' 'WantedBy=default.target' > "${PKG}/usr/lib/systemd/user/hermes.service"
          chmod 644 "${PKG}/usr/lib/systemd/user/hermes.service"
          mkdir -p "${PKG}/DEBIAN"
          printf 'Package: hermes\nVersion: %s\nArchitecture: %s\nMaintainer: Hermes <admin@tseknet.com>\nDescription: Cross-platform notification daemon (per-user gRPC + Wails UI)\n' "$VERSION" "$ARCH" > "${PKG}/DEBIAN/control"
          printf '%s\n' '#!/bin/sh' 'set -e' \
            '/usr/local/bin/hermes stop 2>/dev/null || true' \
            'for uid_dir in /run/user/*; do' \
            '  uid=$(basename "$uid_dir")' \
            '  DBUS_SESSION_BUS_ADDRESS="unix:path=$uid_dir/bus" sudo -u "#$uid" systemctl --user disable --now hermes.service 2>/dev/null || true' \
            'done' > "${PKG}/DEBIAN/prerm"
          chmod 755 "${PKG}/DEBIAN/prerm"
          printf '%s\n' '#!/bin/sh' 'set -e' \
            '/usr/local/bin/hermes install 2>/dev/null || true' > "${PKG}/DEBIAN/postinst"
          chmod 755 "${PKG}/DEBIAN/postinst"
          printf '%s\n' '#!/bin/sh' 'set -e' \
            'if [ "$1" = "purge" ] || [ "$1" = "remove" ]; then' \
            '  /usr/local/bin/hermes uninstall 2>/dev/null || true' \
            '  rm -f /usr/lib/systemd/user/hermes.service' \
            '  for home_dir in /home/*; do' \
            '    rm -f "$home_dir/.config/systemd/user/hermes.service" 2>/dev/null || true' \
            '  done' \
            'fi' > "${PKG}/DEBIAN/postrm"
          chmod 755 "${PKG}/DEBIAN/postrm"
          dpkg-deb --root-owner-group -b "${PKG}" "hermes_${VERSION}.deb"
          cp "hermes_${VERSION}.deb" hermes.deb
          rm -rf "${PKG}"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-deb
          path: dist/hermes.deb

  publish-pkg:
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: hermes-darwin-*

      - name: Build universal .pkg
        run: |
          lipo -create \
            artifacts/hermes-darwin-amd64/hermes-darwin-amd64 \
            artifacts/hermes-darwin-arm64/hermes-darwin-arm64 \
            -output hermes
          chmod 755 hermes
          file hermes
          PKGROOT="$(mktemp -d)"
          mkdir -p "$PKGROOT/usr/local/bin"
          cp hermes "$PKGROOT/usr/local/bin/hermes"
          chmod 755 "$PKGROOT/usr/local/bin/hermes"
          SCRIPTS="$(mktemp -d)"
          printf '%s\n' '#!/bin/sh' \
            '/usr/local/bin/hermes stop 2>/dev/null || true' \
            'exit 0' > "$SCRIPTS/preinstall"
          chmod 755 "$SCRIPTS/preinstall"
          printf '%s\n' '#!/bin/sh' \
            '/usr/local/bin/hermes install 2>/dev/null || true' \
            'exit 0' > "$SCRIPTS/postinstall"
          chmod 755 "$SCRIPTS/postinstall"
          pkgbuild \
            --identifier com.tseknet.hermes \
            --version "${GITHUB_REF_NAME#v}" \
            --root "$PKGROOT" \
            --install-location / \
            --scripts "$SCRIPTS" \
            hermes.pkg
          rm -rf "$PKGROOT" "$SCRIPTS"

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-pkg
          path: hermes.pkg

  release:
    needs: [build, publish-deb, publish-pkg]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Build changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${GITHUB_REF_NAME}$" | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$GITHUB_REF_NAME" ]; then
            RANGE="$GITHUB_REF_NAME"
          else
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          fi
          {
            echo "## What's Changed"
            echo ""
            git log --pretty=format:"- %s (\`%h\`)" "$RANGE" --
            echo ""
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${GITHUB_REF_NAME}"
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            dist/hermes.pkg
            dist/hermes.deb
            dist/hermes.msi
